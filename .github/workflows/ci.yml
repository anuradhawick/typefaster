name: "CI"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typefaster/pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.2"
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Install Story Processing Dependencies
        run: python -m pip install "Pillow<10"

      - name: Process Stories
        run: python process_stories.py
        working-directory: ./python

      - name: Install Angular Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./typefaster

      - name: Lint Angular App
        run: pnpm exec ng lint
        working-directory: ./typefaster

      - name: Build Angular App
        run: pnpm exec ng build --configuration production --subresource-integrity
        working-directory: ./typefaster

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Import S3 Bucket Conditionally
        run: bash import.sh
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./terraform
